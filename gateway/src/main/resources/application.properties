spring.application.name=englishia-gateway

# --- Observabilidade (Actuator + Micrometer) ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# --- Gemini (chave via env: nunca hardcode) ---
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash
gemini.base-url=https://generativelanguage.googleapis.com

# Precos por 1 milhao de tokens — usados so para estimar custo no log/metrica.
# MOCK/ESTIMATIVA: valores aproximados de gemini-2.5-flash. Motivo do mock: preciso
# de um numero para computar custo_estimado desde o dia 1 (SLO de custo do PRD);
# confirmar os valores reais na pagina de pricing do Google antes de levar a serio.
gemini.input-price-per-million=0.30
gemini.output-price-per-million=2.50
