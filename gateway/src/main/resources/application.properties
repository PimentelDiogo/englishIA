spring.application.name=englishia-gateway

# --- Observabilidade (Actuator + Micrometer) ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# --- Gemini (chave via env: nunca hardcode) ---
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash
# Modelo BARATO para tarefas auxiliares (ex.: classificador de escopo) — ADR-004.
gemini.classifier-model=gemini-2.5-flash-lite
gemini.base-url=https://generativelanguage.googleapis.com

# --- Guardrails (ADR-005) ---
guardrail.max-input-length=2000
# Checks baseados em LLM barato (flash-lite): injection/off-scope na entrada e moderacao
# na saida. Sem SaaS externo. Pode desligar (so guardrails deterministicos) via env.
guardrail.llm-checks-enabled=${GUARDRAIL_LLM_CHECKS:true}

# --- RAG (Fase 3 / ADR-003): Postgres + pgvector ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/englishia}
spring.datasource.username=${DB_USER:englishia}
spring.datasource.password=${DB_PASSWORD:englishia}
# Nao derruba a app no boot se o DB estiver fora (o RAG degrada; o chat segue).
spring.datasource.hikari.initialization-fail-timeout=-1
# Falha rapido quando o DB nao esta no ar (evita 30s de espera no boot sem Postgres).
spring.datasource.hikari.connection-timeout=5000

rag.embedding-model=text-embedding-004
rag.embedding-dimensions=768
rag.top-k=4
# Distancia de cosseno maxima p/ um chunk ser considerado relevante (0=identico, 2=oposto).
rag.max-distance=0.55
# Semeia a base de conhecimento no boot (precisa de DB + GEMINI_API_KEY). Idempotente.
rag.seed-on-startup=${RAG_SEED:true}

# --- Model router + cache semântico (Fase 4 / ADR-004) ---
router.enabled=${ROUTER_ENABLED:true}
# Modelo BARATO para diálogo casual (o forte é gemini.model).
router.cheap-model=gemini-2.5-flash-lite
cache.enabled=${CACHE_ENABLED:true}
# Distância de cosseno tight: só perguntas quase idênticas dão HIT (evita falso-hit).
cache.max-distance=0.15

# --- Fallback multi-provedor (Fase 5 / ADR-002) ---
# Claude como fallback do Gemini. DESABILITADO por padrão: sem conta Anthropic,
# roda só com o Gemini. Modelo padrão claude-opus-4-8 (não rebaixar por custo — decisão sua).
fallback.enabled=${FALLBACK_ENABLED:false}
fallback.api-key=${ANTHROPIC_API_KEY:}
fallback.model=claude-opus-4-8
fallback.max-tokens=1024

# Precos por 1 milhao de tokens — usados so para estimar custo no log/metrica.
# MOCK/ESTIMATIVA: valores aproximados de gemini-2.5-flash. Motivo do mock: preciso
# de um numero para computar custo_estimado desde o dia 1 (SLO de custo do PRD);
# confirmar os valores reais na pagina de pricing do Google antes de levar a serio.
gemini.input-price-per-million=0.30
gemini.output-price-per-million=2.50
