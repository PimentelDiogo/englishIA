# Stack completo do englishIA (Fase 1–5):
#   db         — Postgres + pgvector (banco vetorial do RAG / ADR-003)
#   gateway    — AI Gateway Spring Boot (build via Dockerfile)
#   prometheus — raspa /actuator/prometheus (auditoria de token/custo/latência)
#   grafana    — dashboard visual (observabilidade)
#
# Subir tudo:  GEMINI_API_KEY=sua_chave docker compose up -d --build
#   Gateway    → http://localhost:8080/tutor/chat
#   Métricas   → http://localhost:8080/actuator/prometheus
#   Prometheus → http://localhost:9090
#   Grafana    → http://localhost:3000  (dashboard "englishIA — LLM")
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: englishia-pgvector
    environment:
      POSTGRES_DB: englishia
      POSTGRES_USER: englishia
      POSTGRES_PASSWORD: englishia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U englishia -d englishia"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build: .
    container_name: englishia-gateway
    depends_on:
      db:
        condition: service_healthy
    environment:
      # No compose, o banco é o host "db" (não localhost).
      DB_URL: jdbc:postgresql://db:5432/englishia
      DB_USER: englishia
      DB_PASSWORD: englishia
      # Passa as chaves do host (opcionais). Sem GEMINI_API_KEY o RAG/seed degrada.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FALLBACK_ENABLED: ${FALLBACK_ENABLED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:latest
    container_name: englishia-prometheus
    depends_on:
      - gateway
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: englishia-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  pgdata:
